<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 545 190" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Logo DUNO 360</title>
  <desc id="logoDesc">DUNO 360 — plateforme e-commerce tout-en-un : livres, cours en ligne, marketplace et supermarché. Un globe avec un panier et des flèches de commerce.</desc>
  <defs>
    <linearGradient id="tealArc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1fb6c7"/><stop offset="1" stop-color="#0f9fb0"/>
    </linearGradient>
    <linearGradient id="yellowArc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffc63f"/><stop offset="1" stop-color="#f5a623"/>
    </linearGradient>
    <marker id="mTeal" markerWidth="7" markerHeight="7" refX="3" refY="3.4" orient="auto">
      <path d="M0 0 L7 3.4 L0 6.8 Z" fill="#0f9fb0"/>
    </marker>
    <marker id="mYellow" markerWidth="7" markerHeight="7" refX="3" refY="3.4" orient="auto">
      <path d="M0 0 L7 3.4 L0 6.8 Z" fill="#f5a623"/>
    </marker>
  </defs>

  <!-- Wordmark: textLength pins glyph width so rendering is identical on every
       platform font stack (Segoe UI / Roboto / Helvetica / Arial fallbacks). -->
  <g font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" fill="#17457e">
    <text x="14" y="106" font-size="100" textLength="302" lengthAdjust="spacingAndGlyphs">DUNO</text>
    <text x="176" y="178" font-size="60" textLength="120" lengthAdjust="spacingAndGlyphs">360</text>
  </g>

  <!-- Icon: cyclic commerce arrows wrapping a globe with a shopping cart -->
  <!-- teal arc sweeps the left + top; orange arc sweeps the right + bottom -->
  <path d="M404 150 A70 70 0 0 1 514 60" fill="none" stroke="url(#tealArc)" stroke-width="13" stroke-linecap="round" marker-end="url(#mTeal)"/>
  <path d="M522 84 A70 70 0 0 1 400 150" fill="none" stroke="url(#yellowArc)" stroke-width="13" stroke-linecap="round" marker-end="url(#mYellow)"/>

  <!-- globe -->
  <g stroke="#17457e" stroke-width="4" fill="none">
    <circle cx="454" cy="92" r="46"/>
    <ellipse cx="454" cy="92" rx="18" ry="46"/>
    <line x1="411" y1="76" x2="497" y2="76"/>
    <line x1="410" y1="108" x2="498" y2="108"/>
  </g>

  <!-- shopping cart -->
  <g stroke="#0f9fb0" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M430 78 h10 l7 34 h30 l8 -25 h-42"/>
    <circle cx="451" cy="120" r="4.6" fill="#0f9fb0" stroke="none"/>
    <circle cx="473" cy="120" r="4.6" fill="#0f9fb0" stroke="none"/>
  </g>
</svg>
