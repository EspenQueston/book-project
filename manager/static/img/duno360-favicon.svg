<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="DUNO 360">
  <defs>
    <linearGradient id="fbg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#14245f"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="fy" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffd54a"/>
      <stop offset="100%" stop-color="#f5b700"/>
    </linearGradient>
  </defs>
  <!-- Navy rounded badge: visible on light or dark browser tabs -->
  <rect x="1" y="1" width="62" height="62" rx="14" fill="url(#fbg)"/>
  <!-- Teal commerce arc -->
  <path d="M14 20 A24 24 0 0 1 50 20" fill="none" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"/>
  <!-- 360 mark: textLength keeps it centered on every platform -->
  <text x="32" y="46" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-weight="800" font-size="26" fill="url(#fy)" text-anchor="middle"
        textLength="40" lengthAdjust="spacingAndGlyphs">360</text>
</svg>
