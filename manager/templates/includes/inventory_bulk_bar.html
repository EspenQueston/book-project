{% load i18n %}
<style>
    .inv-bulk-bar {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        padding: 14px 18px;
        margin-bottom: 18px;
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(29,78,216,.12), rgba(20,36,95,.10));
        border: 1px solid rgba(29,78,216,.22);
        box-shadow: 0 10px 28px rgba(29,78,216,.10);
    }
    .inv-bulk-bar[hidden] { display: none !important; }
    .inv-bulk-count { font-weight: 700; color: #4338ca; min-width: 120px; }
    .inv-select-wrap { flex-shrink: 0; display: flex; align-items: center; }
    .inv-select { width: 18px; height: 18px; cursor: pointer; accent-color: #1d4ed8; }
    .inv-bulk-field { display: flex; align-items: center; gap: 8px; }
    .inv-bulk-field label { font-size: 0.82rem; font-weight: 700; color: #475569; margin: 0; white-space: nowrap; }
    .inv-bulk-field select,
    .inv-bulk-field input {
        border-radius: 10px;
        border: 1px solid rgba(29,78,216,.22);
        padding: 6px 10px;
        font-size: 0.85rem;
        font-weight: 600;
        min-width: 72px;
    }
    .inv-bulk-apply {
        border: 0;
        border-radius: 12px;
        padding: 8px 16px;
        font-size: 0.85rem;
        font-weight: 700;
        background: linear-gradient(135deg, #1d4ed8, #14245f);
        color: #fff;
        box-shadow: 0 8px 20px rgba(29,78,216,.28);
    }
    .inv-bulk-apply:hover { transform: translateY(-1px); color: #fff; }
    .inv-bulk-select-all { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; color: #475569; }
</style>

<div class="inv-bulk-select-all mb-2">
    <input type="checkbox" class="inv-select form-check-input m-0" id="invSelectAll">
    <label for="invSelectAll" class="mb-0">{% trans "Select all in tab" %}</label>
</div>

<div class="inv-bulk-bar" id="invBulkBar" hidden>
    <span class="inv-bulk-count" id="invBulkCount">0 {% trans "items selected" %}</span>
    <form method="post" id="invBulkForm" class="d-flex align-items-center flex-wrap gap-3 mb-0"{% if bulk_form_action %} action="{{ bulk_form_action }}"{% endif %}>
        {% csrf_token %}
        <input type="hidden" name="bulk" value="1">
        <div class="inv-bulk-field">
            <label for="invBulkAction">{% trans "Action" %}</label>
            <select name="action" id="invBulkAction">
                <option value="add">{% trans "Add stock" %}</option>
                <option value="subtract">{% trans "Remove stock" %}</option>
                <option value="set">{% trans "Set stock" %}</option>
            </select>
        </div>
        <div class="inv-bulk-field" id="invBulkDeltaWrap">
            <label for="invBulkDelta">{% trans "Quantity" %}</label>
            <input type="number" name="delta" id="invBulkDelta" value="1" min="1" class="inv-input">
        </div>
        <div class="inv-bulk-field" id="invBulkSetWrap" hidden>
            <label for="invBulkSetValue">{% trans "New stock" %}</label>
            <input type="number" name="manual_value" id="invBulkSetValue" value="0" min="0" class="inv-input">
        </div>
        <button type="submit" class="inv-bulk-apply"><i class="fas fa-check-double me-1"></i>{% trans "Apply to selected" %}</button>
    </form>
</div>
<script src="/static/js/inventory_bulk.js" defer></script>
