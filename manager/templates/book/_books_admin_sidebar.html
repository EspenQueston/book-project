<!-- Books sub-panel sidebar — mirrors marketplace/admin/base.html's pattern
     (its own scoped nav + "back to main dashboard" footer), but as an
     include like _admin_sidebar.html rather than a base template, so the
     book-admin pages below don't need their outer <html>/<head> touched. -->
{% include "admin/_admin_sidebar_styles.html" %}
<aside class="admin-sidebar-wrap" id="adminSidebar" aria-label="图书管理导航">
    <div class="sidebar-brand">
        <div class="d-flex align-items-center gap-3">
            <div class="brand-icon"><i class="fas fa-book"></i></div>
            <div class="min-w-0">
                <h4 class="text-white mb-0" data-zh="图书中心" data-en="Books Center" data-fr="Centre livres">图书中心</h4>
                <small class="d-block text-truncate">欢迎回来，{{ name }}</small>
            </div>
        </div>
    </div>
    <div class="sidebar-scroll">
        <nav class="nav flex-column">
            <a class="nav-link {% if request.path == '/manager/book-dashboard/' %}active{% endif %}" href="/manager/book-dashboard/">
                <i class="fas fa-chart-pie"></i><span data-zh="图书仪表板" data-en="Book Dashboard" data-fr="Tableau de bord livres">图书仪表板</span>
            </a>
            <a class="nav-link {% if request.path == '/manager/book_list/' or '/manager/add_book/' in request.path or '/manager/edit_book/' in request.path %}active{% endif %}" href="/manager/book_list/">
                <i class="fas fa-book"></i><span>图书管理</span>
            </a>
            <a class="nav-link {% if request.path == '/manager/author_list/' or '/manager/add_author/' in request.path or '/manager/edit_author/' in request.path %}active{% endif %}" href="/manager/author_list/">
                <i class="fas fa-user-edit"></i><span>作者管理</span>
            </a>
            <a class="nav-link {% if request.path == '/manager/publisher_list/' or '/manager/add_publisher/' in request.path or '/manager/edit_publisher/' in request.path %}active{% endif %}" href="/manager/publisher_list/">
                <i class="fas fa-building"></i><span>出版社管理</span>
            </a>
            <a class="nav-link {% if request.path == '/manager/book_categories/' %}active{% endif %}" href="/manager/book_categories/">
                <i class="fas fa-layer-group"></i><span data-zh="图书分类" data-en="Categories" data-fr="Catégories">图书分类</span>
            </a>
            <a class="nav-link {% if '/manager/order_list/' in request.path or '/manager/order_detail/' in request.path %}active{% endif %}" href="/manager/order_list/">
                <i class="fas fa-shopping-cart"></i><span>订单管理</span>
            </a>
        </nav>
    </div>
    <div class="sidebar-footer">
        <nav class="nav flex-column">
            <a class="nav-link" href="/manager/dashboard/">
                <i class="fas fa-arrow-left"></i><span data-zh="返回主面板" data-en="Back to main dashboard" data-fr="Retour au tableau de bord">返回主面板</span>
            </a>
            <a class="nav-link" href="/manager/public/">
                <i class="fas fa-globe"></i><span>查看网站</span>
            </a>
            <a class="nav-link" href="/manager/logout/">
                <i class="fas fa-sign-out-alt"></i><span>退出登录</span>
            </a>
        </nav>
    </div>
</aside>
<div class="admin-sidebar-backdrop" id="adminSidebarBackdrop" aria-hidden="true"></div>
<script>
(function() {
    var sidebar = document.getElementById('adminSidebar');
    var backdrop = document.getElementById('adminSidebarBackdrop');
    if (!sidebar || !backdrop) return;
    var storageKey = 'adminSidebarCollapsed';
    var toggle = null;

    function mountToolbarToggle() {
        var main = document.querySelector('.admin-main-offset');
        if (!main || document.getElementById('adminSidebarToggle')) {
            toggle = document.getElementById('adminSidebarToggle');
            return !!toggle;
        }
        var toolbar = document.createElement('div');
        toolbar.className = 'admin-top-toolbar';
        toolbar.innerHTML = '<button type="button" class="admin-sidebar-toggle" id="adminSidebarToggle" aria-controls="adminSidebar" aria-expanded="true" title="Afficher / cacher le menu"><i class="fas fa-bars-staggered"></i></button>';
        main.insertBefore(toolbar, main.firstChild);
        toggle = document.getElementById('adminSidebarToggle');
        return !!toggle;
    }

    function isMobile() {
        return window.innerWidth <= 991;
    }
    function closeMobile() {
        sidebar.classList.remove('open');
        backdrop.classList.remove('show');
        if (toggle) toggle.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
    }
    function openMobile() {
        sidebar.classList.add('open');
        backdrop.classList.add('show');
        if (toggle) toggle.setAttribute('aria-expanded', 'true');
        document.body.style.overflow = 'hidden';
    }
    function applyDesktopState(collapsed) {
        document.body.classList.toggle('admin-sidebar-collapsed', collapsed && !isMobile());
        if (!toggle) return;
        toggle.setAttribute('aria-expanded', collapsed && !isMobile() ? 'false' : 'true');
        var icon = toggle.querySelector('i');
        if (icon) icon.className = collapsed && !isMobile() ? 'fas fa-bars' : 'fas fa-bars-staggered';
    }
    function onToggleClick() {
        if (isMobile()) {
            if (sidebar.classList.contains('open')) closeMobile(); else openMobile();
            return;
        }
        var collapsed = !document.body.classList.contains('admin-sidebar-collapsed');
        localStorage.setItem(storageKey, collapsed ? '1' : '0');
        applyDesktopState(collapsed);
    }
    function init() {
        if (!mountToolbarToggle()) return;
        if (toggle.dataset.bound !== '1') {
            toggle.dataset.bound = '1';
            toggle.addEventListener('click', onToggleClick);
        }
        applyDesktopState(localStorage.getItem(storageKey) === '1');
    }
    backdrop.addEventListener('click', closeMobile);
    window.addEventListener('resize', function() {
        closeMobile();
        applyDesktopState(localStorage.getItem(storageKey) === '1');
    });
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
