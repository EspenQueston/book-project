{% load i18n %}
<div class="vendor-mobile-nav d-lg-none">
    <label class="visually-hidden" for="vendorMobileJump">{% trans "卖家菜单" %}</label>
    <select id="vendorMobileJump" class="form-select form-select-sm" onchange="vendorMobileJumpChange(this)">
        <option value="">{% trans "— 卖家菜单 —" %}</option>
        {% if vendor %}
        <optgroup label="{% trans '概览' %}">
            <option value="{% url 'manager:vendor_dashboard' %}">{% trans "概览" %}</option>
            <option value="{% url 'manager:public_vendor_shop' vendor.id %}">{% trans "店铺前台" %}</option>
        </optgroup>
        {% endif %}
        <optgroup label="{% trans '订单' %}">
            <option value="{% url 'manager:vendor_orders_hub' %}">{% trans "订单中心" %}</option>
        </optgroup>
        <optgroup label="{% trans '图书' %}">
            <option value="{% url 'manager:vendor_books' %}">{% trans "图书管理" %}</option>
        </optgroup>
        <optgroup label="Marketplace">
            <option value="{% url 'marketplace:vendor_products' %}">{% trans "商品列表" %}</option>
            <option value="{% url 'marketplace:vendor_supermarket' %}">{% trans "超市商品" %}</option>
            <option value="{% url 'marketplace:vendor_courses' %}">{% trans "课程列表" %}</option>
        </optgroup>
        <optgroup label="{% trans '财务' %}">
            <option value="{% url 'manager:vendor_payments' %}{% if admin_access and vendor %}?vendor_id={{ vendor.id }}{% endif %}">{% trans "付款与托管" %}</option>
        </optgroup>
        <optgroup label="{% trans '客户' %}">
            <option value="{% url 'manager:vendor_messages' %}">{% trans "客户消息" %}</option>
        </optgroup>
        <optgroup label="{% trans '账户' %}">
            <option value="{% url 'manager:vendor_logout' %}">{% trans "退出登录" %}</option>
        </optgroup>
    </select>
</div>
<style>
.vendor-mobile-nav {
    display: none;
    padding: 10px 14px;
    background: rgba(255,255,255,0.96);
    border-bottom: 1px solid rgba(29,78,216,0.15);
    position: sticky;
    top: 0;
    z-index: 1030;
}
html[data-theme="dark"] .vendor-mobile-nav {
    background: rgba(30,41,59,0.96);
    border-bottom-color: #334155;
}
@media (max-width: 991px) {
    .vendor-mobile-nav { display: block; }
}
.vendor-mobile-nav select { border-radius: 12px !important; font-weight: 600; }
</style>
