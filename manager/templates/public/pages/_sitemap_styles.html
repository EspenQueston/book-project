<style>
:root {
    --duno-hero-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

/* ── Hero (platform theme) ── */
.duno-sitemap-hero {
    position: relative;
    background: var(--duno-hero-gradient);
    padding: 132px 0 88px;
    min-height: 420px;
    isolation: isolate;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
}
.duno-sitemap-hero::before,
.duno-sitemap-hero::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
}
.duno-sitemap-hero::before {
    width: 620px; height: 620px; top: -42%; right: -14%;
    background: radial-gradient(circle, rgba(255,255,255,.18) 0%, transparent 70%);
}
.duno-sitemap-hero::after {
    width: 420px; height: 420px; bottom: -38%; left: -10%;
    background: radial-gradient(circle, rgba(255,255,255,.12) 0%, transparent 70%);
}
.duno-sitemap-ambient {
    position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
}
.duno-sitemap-ambient .hero-text-grid {
    position: absolute; inset: 0;
    background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 52px 52px;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 20%, transparent 78%);
    opacity: .55;
}
.duno-sitemap-ambient .hero-aurora {
    position: absolute; border-radius: 50%; filter: blur(90px); opacity: .26;
}
.duno-sitemap-ambient .hero-aurora-a {
    width: 260px; height: 260px; right: -4%; bottom: -12%;
    background: rgba(118,75,162,.55);
    animation: dunoSitemapDrift 16s ease-in-out infinite;
}
.duno-sitemap-ambient .hero-aurora-b {
    width: 210px; height: 210px; left: -6%; top: -8%;
    background: rgba(99,102,241,.42);
    animation: dunoSitemapDrift 13s ease-in-out infinite reverse;
}
@keyframes dunoSitemapDrift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(12px, -16px) scale(1.06); }
}
.duno-sitemap-hero-inner {
    position: relative; z-index: 3;
}
.duno-sitemap-hero h1 {
    color: #fff; font-weight: 800;
    font-size: clamp(2rem, 4vw, 2.85rem);
    letter-spacing: -.03em; line-height: 1.12;
    text-shadow: 0 2px 24px rgba(15, 23, 42, 0.18);
    margin-bottom: 14px;
}
.duno-sitemap-hero .lead {
    color: rgba(255,255,255,.92); font-size: 1.08rem;
    max-width: 580px; line-height: 1.75;
}
.duno-sitemap-hero .duno-page-badge {
    display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px;
    border-radius: 999px; background: rgba(255,255,255,.14);
    border: 1px solid rgba(255,255,255,.2); color: #fff;
    font-size: .78rem; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; margin-bottom: 18px; backdrop-filter: blur(12px);
}
.duno-sitemap-stats {
    display: flex; flex-wrap: wrap; gap: 14px; margin-top: 24px;
}
.duno-sitemap-stat {
    display: flex; flex-direction: column; align-items: center;
    padding: 14px 22px; border-radius: 16px;
    background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.22);
    backdrop-filter: blur(12px); min-width: 100px;
    transition: transform .22s ease, background .22s ease;
}
.duno-sitemap-stat:hover { transform: translateY(-3px); background: rgba(255,255,255,.22); }
.duno-sitemap-stat-num {
    font-size: 1.6rem; font-weight: 800; color: #fff; line-height: 1;
}
.duno-sitemap-stat-label {
    font-size: .72rem; font-weight: 700; color: rgba(255,255,255,.85);
    text-transform: uppercase; letter-spacing: .06em; margin-top: 4px;
}
.duno-sitemap-jump {
    display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px;
}
.duno-sitemap-jump a {
    padding: 10px 18px; border-radius: 999px; font-weight: 700; font-size: .85rem;
    border: 2px solid rgba(255,255,255,.35); color: #fff; text-decoration: none;
    transition: all .22s; backdrop-filter: blur(8px);
    display: inline-flex; align-items: center; gap: 8px;
}
.duno-sitemap-jump a:hover,
.duno-sitemap-jump a.active {
    background: rgba(255,255,255,.95); border-color: #fff; color: #667eea;
    box-shadow: 0 8px 28px rgba(15,23,42,.18);
}
.duno-sitemap-wave {
    position: absolute; left: 0; right: 0; bottom: -1px; z-index: 4; line-height: 0;
}
.duno-sitemap-wave svg { display: block; width: 100%; height: 64px; }

/* ── Toolbar ── */
.duno-sitemap-toolbar {
    display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
    gap: 16px; margin: 36px 0 28px;
    padding: 18px 22px; border-radius: 20px;
    background: #fff; border: 1px solid rgba(102,126,234,.12);
    box-shadow: 0 12px 40px rgba(102,126,234,.08);
}
.duno-sitemap-search-wrap {
    flex: 1; min-width: 220px; max-width: 420px;
    display: flex; align-items: center; gap: 10px;
    background: #f8faff; border-radius: 999px;
    padding: 0 18px; border: 1px solid rgba(102,126,234,.12);
    transition: border-color .2s, box-shadow .2s;
}
.duno-sitemap-search-wrap:focus-within {
    border-color: rgba(102,126,234,.45);
    box-shadow: 0 0 0 4px rgba(102,126,234,.1);
}
.duno-sitemap-search-wrap i { color: #667eea; font-size: .9rem; }
.duno-sitemap-search-wrap input {
    flex: 1; border: none !important; background: transparent !important;
    padding: 12px 0 !important; font-size: .95rem; color: #334155;
    min-height: 0 !important; box-shadow: none !important;
    border-radius: 0 !important; transform: none !important;
}
.duno-sitemap-search-wrap input:focus { outline: none; box-shadow: none !important; }
.duno-sitemap-search-wrap input::placeholder { color: #94a3b8; }
.duno-sitemap-filter-hint {
    font-size: .85rem; color: #64748b; font-weight: 600;
}
.duno-sitemap-filter-hint span { color: #667eea; font-weight: 800; }

/* ── Grid & cards ── */
.duno-sitemap-body { padding-bottom: 80px; }
.duno-sitemap-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 22px;
}
.duno-sitemap-card {
    background: #fff; border-radius: 22px; overflow: hidden;
    border: 1px solid rgba(102,126,234,.1);
    box-shadow: 0 14px 44px rgba(15,23,42,.06);
    transition: transform .28s ease, box-shadow .28s ease, opacity .28s ease;
    scroll-margin-top: 100px;
}
.duno-sitemap-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 22px 56px rgba(102,126,234,.16);
}
.duno-sitemap-card.is-hidden { display: none; }
.duno-sitemap-card-head {
    padding: 20px 22px;
    background: linear-gradient(135deg, rgba(102,126,234,.1), rgba(118,75,162,.08));
    border-bottom: 1px solid rgba(102,126,234,.1);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.duno-sitemap-card-head h2 {
    font-size: 1.05rem; font-weight: 800; color: #1e293b;
    margin: 0; display: flex; align-items: center; gap: 12px;
}
.duno-sitemap-card-icon {
    width: 42px; height: 42px; border-radius: 13px; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--duno-hero-gradient); color: #fff; font-size: 1rem;
    box-shadow: 0 8px 22px rgba(102,126,234,.28);
}
.duno-sitemap-card-count {
    font-size: .72rem; font-weight: 800; padding: 5px 12px;
    border-radius: 999px; background: rgba(102,126,234,.12); color: #667eea;
    white-space: nowrap;
}
.duno-sitemap-card ul { list-style: none; padding: 12px 14px 16px; margin: 0; }
.duno-sitemap-card li { margin-bottom: 4px; }
.duno-sitemap-card li.is-hidden { display: none; }
.duno-sitemap-card a {
    color: #475569; text-decoration: none; font-size: .92rem; font-weight: 600;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 11px 14px; border-radius: 12px; transition: all .22s ease;
}
.duno-sitemap-card a .link-label { display: flex; align-items: center; gap: 10px; }
.duno-sitemap-card a .link-arrow {
    width: 28px; height: 28px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(102,126,234,.08); color: #667eea;
    font-size: .65rem; transition: all .22s ease; flex-shrink: 0;
}
.duno-sitemap-card a:hover {
    background: linear-gradient(135deg, rgba(102,126,234,.08), rgba(118,75,162,.06));
    color: #4338ca; padding-left: 18px;
}
.duno-sitemap-card a:hover .link-arrow {
    background: var(--duno-hero-gradient); color: #fff;
    transform: translateX(3px);
}
.duno-sitemap-card a i.link-dot {
    font-size: .45rem; color: #667eea; opacity: .7;
}

/* ── Empty state ── */
.duno-sitemap-empty {
    display: none; text-align: center; padding: 60px 24px;
    border-radius: 22px; background: #fff;
    border: 1px dashed rgba(102,126,234,.25);
}
.duno-sitemap-empty.is-visible { display: block; }
.duno-sitemap-empty i { font-size: 2.5rem; color: #667eea; opacity: .5; margin-bottom: 16px; }
.duno-sitemap-empty h3 { font-size: 1.15rem; font-weight: 800; color: #1e293b; }
.duno-sitemap-empty p { color: #64748b; margin: 8px 0 0; }

/* ── CTA ── */
.duno-sitemap-cta {
    margin-top: 32px; border-radius: 22px; padding: 28px 32px;
    background: var(--duno-hero-gradient); color: #fff;
    display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px;
    box-shadow: 0 20px 50px rgba(102,126,234,.28);
}
.duno-sitemap-cta h3 { font-size: 1.15rem; font-weight: 800; margin: 0 0 4px; }
.duno-sitemap-cta p { margin: 0; opacity: .9; font-size: .9rem; }
.duno-sitemap-cta .btn-light {
    border-radius: 12px; font-weight: 800; padding: 12px 22px; color: #4338ca; border: none;
}

html[data-theme="dark"] .duno-sitemap-toolbar,
html[data-theme="dark"] .duno-sitemap-card,
html[data-theme="dark"] .duno-sitemap-empty {
    background: var(--bg-surface); border-color: var(--border-default);
}
html[data-theme="dark"] .duno-sitemap-card-head { background: rgba(102,126,234,.12); }
html[data-theme="dark"] .duno-sitemap-card-head h2 { color: var(--text-primary); }
html[data-theme="dark"] .duno-sitemap-card a { color: var(--text-secondary); }
html[data-theme="dark"] .duno-sitemap-search-wrap { background: var(--bg-page); }
html[data-theme="dark"] .duno-sitemap-wave svg path { fill: var(--bg-page, #141422); }

@media (max-width: 767px) {
    .duno-sitemap-hero { min-height: auto; padding: 108px 0 72px; }
    .duno-sitemap-wave svg { height: 40px; }
    .duno-sitemap-toolbar { margin-top: 24px; padding: 14px 16px; }
    .duno-sitemap-search-wrap { max-width: 100%; }
    .duno-sitemap-stats { gap: 10px; }
    .duno-sitemap-stat { min-width: 80px; padding: 12px 16px; }
}
</style>
