<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建文章 - 图书管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .main-container { padding: 20px 0; }
        .header-card {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border-radius: 15px;
            padding: 25px 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-card h2 { margin: 0; font-weight: 700; }
        .content-card {
            background: white;
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 25px; }
        .form-group label {
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
            display: block;
        }
        .form-group label i { color: var(--primary-color); margin-right: 8px; }
        .form-control, .form-select {
            border: 2px solid #e8ecf1;
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.3s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        textarea.form-control { min-height: 300px; font-size: 1rem; line-height: 1.8; }
        .form-check-input:checked {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }
        .preview-area {
            border: 2px dashed #e8ecf1;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .preview-area:hover {
            border-color: var(--primary-color);
            background: #f8f9ff;
        }
        .preview-area i { font-size: 3rem; color: #ccc; margin-bottom: 10px; }
        .preview-area img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
        }
        .btn-submit {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.05rem;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .sidebar-card {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(102, 126, 234, 0.1);
        }
        .sidebar-card h6 {
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="container main-container">
        <div class="header-card">
            <div>
                <h2><i class="fas fa-pen-fancy me-2"></i>新建文章</h2>
                <small style="opacity: 0.9;">创建新的博客文章</small>
            </div>
            <a href="/manager/blog_list/" class="btn btn-outline-light btn-sm">
                <i class="fas fa-arrow-left me-1"></i>返回列表
            </a>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger alert-dismissible fade show" style="border-radius: 12px;">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row g-4">
                <!-- Main Content -->
                <div class="col-lg-8">
                    <div class="content-card">
                        <div class="form-group">
                            <label><i class="fas fa-heading"></i>文章标题</label>
                            <input type="text" name="title" class="form-control" placeholder="输入文章标题..." required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-align-left"></i>摘要</label>
                            <textarea name="excerpt" class="form-control" style="min-height: 100px;" placeholder="简短描述文章内容（可选）..."></textarea>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-file-alt"></i>文章内容</label>
                            <textarea name="content" class="form-control" placeholder="写下您的文章内容..." required></textarea>
                            <small class="text-muted mt-1 d-block">支持HTML标签格式化内容</small>
                        </div>
                    </div>
                </div>

                <!-- Sidebar -->
                <div class="col-lg-4">
                    <!-- Publish Settings -->
                    <div class="sidebar-card">
                        <h6><i class="fas fa-cog me-2"></i>发布设置</h6>
                        <div class="form-group">
                            <label><i class="fas fa-toggle-on"></i>状态</label>
                            <select name="status" class="form-select">
                                <option value="draft">草稿</option>
                                <option value="published">发布</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-folder"></i>分类</label>
                            <select name="category" class="form-select">
                                <option value="">无分类</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}">{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-user"></i>作者名称</label>
                            <input type="text" name="author_name" class="form-control" value="Admin" required>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="isFeatured" name="is_featured">
                            <label class="form-check-label" for="isFeatured">
                                <i class="fas fa-star me-1" style="color: #f59e0b;"></i>设为精选文章
                            </label>
                        </div>
                    </div>

                    <!-- Cover Image -->
                    <div class="sidebar-card">
                        <h6><i class="fas fa-image me-2"></i>封面图片</h6>
                        <div class="preview-area" onclick="document.getElementById('coverInput').click();">
                            <div id="coverPreview">
                                <i class="fas fa-cloud-upload-alt d-block"></i>
                                <p class="text-muted mb-0">点击上传封面图片</p>
                                <small class="text-muted">支持 JPG, PNG, WebP</small>
                            </div>
                        </div>
                        <input type="file" id="coverInput" name="cover_image" accept="image/*" style="display: none;" onchange="previewImage(this)">
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-submit w-100">
                        <i class="fas fa-save me-2"></i>保存文章
                    </button>
                </div>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function previewImage(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('coverPreview').innerHTML = '<img src="' + e.target.result + '" alt="Preview">';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
