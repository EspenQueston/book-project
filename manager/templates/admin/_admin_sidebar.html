<!-- Comprehensive admin sidebar — include this in any admin page that lacks a sidebar -->
<style>
    .admin-sidebar-wrap {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        height: 100vh;
        box-shadow: 4px 0 28px rgba(102, 126, 234, 0.28);
        position: fixed;
        width: 268px;
        z-index: 1050;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        top: 0;
        left: 0;
    }
    .admin-sidebar-wrap .sidebar-brand {
        padding: 1.15rem 1.1rem 1rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .admin-sidebar-wrap .sidebar-brand .brand-icon {
        width: 42px; height: 42px; border-radius: 12px;
        background: rgba(255,255,255,0.18);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.1rem; color: #fff;
    }
    .admin-sidebar-wrap .sidebar-brand h4 {
        font-size: 1.05rem; font-weight: 700; letter-spacing: -0.02em; color: #fff;
    }
    .admin-sidebar-wrap .sidebar-brand small {
        color: rgba(255,255,255,0.65) !important; font-size: 0.78rem;
    }
    .admin-sidebar-wrap .sidebar-scroll { flex: 1; padding: 0.5rem 0 1rem; }
    .admin-sidebar-wrap .nav-section-label {
        font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.14em; color: rgba(255,255,255,0.45);
        padding: 0.85rem 1.15rem 0.35rem;
    }
    .admin-sidebar-wrap .nav-link {
        color: rgba(255,255,255,0.92); padding: 0.55rem 0.95rem;
        border-radius: 10px; margin: 2px 10px;
        transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
        display: flex; align-items: center; gap: 0.65rem;
        font-size: 0.88rem; font-weight: 500; border: 1px solid transparent;
    }
    .admin-sidebar-wrap .nav-link i { width: 1.2rem; text-align: center; opacity: 0.92; font-size: 0.95rem; }
    .admin-sidebar-wrap .nav-link:hover {
        background: rgba(255,255,255,0.12); color: #fff; transform: translateX(2px);
    }
    .admin-sidebar-wrap .nav-link.active {
        background: rgba(255,255,255,0.18); color: #fff;
        border-color: rgba(255,255,255,0.22);
        box-shadow: inset 3px 0 0 rgba(255,255,255,0.85);
    }
    .admin-sidebar-wrap .sidebar-footer {
        border-top: 1px solid rgba(255,255,255,0.1); padding: 0.35rem 0 0.75rem;
    }
    .admin-sidebar-wrap .sidebar-footer .nav-link {
        color: rgba(255,255,255,0.72); font-size: 0.84rem;
    }
    .admin-main-offset { margin-left: 268px; min-height: 100vh; padding: 20px; transition: margin-left 0.28s ease; }
    .admin-top-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
        min-height: 42px;
    }
    .admin-sidebar-toggle {
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.35);
        font-size: 1rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, left 0.28s ease;
    }
    .admin-sidebar-toggle:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 28px rgba(102, 126, 234, 0.45);
        color: #fff;
    }
    body.admin-sidebar-collapsed .admin-sidebar-toggle {
        background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
    }
    .admin-sidebar-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(15,23,42,0.42);
        z-index: 1040;
    }
    body.admin-sidebar-collapsed .admin-sidebar-wrap { transform: translateX(-100%); }
    body.admin-sidebar-collapsed .admin-main-offset { margin-left: 0; }
    @media (max-width: 991.98px) {
        .admin-sidebar-wrap { transform: translateX(-100%); }
        .admin-sidebar-wrap.open { transform: translateX(0); }
        .admin-main-offset { margin-left: 0; }
        .admin-sidebar-backdrop.show { display: block; }
    }
</style>

<div class="admin-sidebar-backdrop" id="adminSidebarBackdrop" aria-hidden="true"></div>
<script>
(function() {
    var sidebar = document.getElementById('adminSidebar');
    var backdrop = document.getElementById('adminSidebarBackdrop');
    if (!sidebar || !backdrop) return;
    var storageKey = 'adminSidebarCollapsed';
    var toggle = null;

    function mountToolbarToggle() {
        var main = document.querySelector('.admin-main-offset');
        if (!main || document.getElementById('adminSidebarToggle')) {
            toggle = document.getElementById('adminSidebarToggle');
            return !!toggle;
        }
        var toolbar = document.createElement('div');
        toolbar.className = 'admin-top-toolbar';
        toolbar.innerHTML = '<button type="button" class="admin-sidebar-toggle" id="adminSidebarToggle" aria-controls="adminSidebar" aria-expanded="true" title="Afficher / cacher le menu"><i class="fas fa-bars-staggered"></i></button>';
        main.insertBefore(toolbar, main.firstChild);
        toggle = document.getElementById('adminSidebarToggle');
        return !!toggle;
    }

    function isMobile() {
        return window.innerWidth <= 991;
    }
    function closeMobile() {
        sidebar.classList.remove('open');
        backdrop.classList.remove('show');
        if (toggle) toggle.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
    }
    function openMobile() {
        sidebar.classList.add('open');
        backdrop.classList.add('show');
        if (toggle) toggle.setAttribute('aria-expanded', 'true');
        document.body.style.overflow = 'hidden';
    }
    function applyDesktopState(collapsed) {
        document.body.classList.toggle('admin-sidebar-collapsed', collapsed && !isMobile());
        if (!toggle) return;
        toggle.setAttribute('aria-expanded', collapsed && !isMobile() ? 'false' : 'true');
        var icon = toggle.querySelector('i');
        if (icon) icon.className = collapsed && !isMobile() ? 'fas fa-bars' : 'fas fa-bars-staggered';
    }
    function onToggleClick() {
        if (isMobile()) {
            if (sidebar.classList.contains('open')) closeMobile(); else openMobile();
            return;
        }
        var collapsed = !document.body.classList.contains('admin-sidebar-collapsed');
        localStorage.setItem(storageKey, collapsed ? '1' : '0');
        applyDesktopState(collapsed);
    }
    function init() {
        if (!mountToolbarToggle()) return;
        if (toggle.dataset.bound !== '1') {
            toggle.dataset.bound = '1';
            toggle.addEventListener('click', onToggleClick);
        }
        applyDesktopState(localStorage.getItem(storageKey) === '1');
    }
    backdrop.addEventListener('click', closeMobile);
    window.addEventListener('resize', function() {
        closeMobile();
        applyDesktopState(localStorage.getItem(storageKey) === '1');
    });
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
