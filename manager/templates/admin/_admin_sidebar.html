<!-- Comprehensive admin sidebar — include this in any admin page that lacks a sidebar -->
{% include "admin/_admin_sidebar_styles.html" %}
<aside class="admin-sidebar-wrap" id="adminSidebar" aria-label="管理导航">
    <div class="sidebar-brand">
        <div class="d-flex align-items-center gap-3">
            <div class="brand-icon"><i class="fas fa-user-shield"></i></div>
            <div class="min-w-0">
                <h4 class="text-white mb-0">管理面板</h4>
                <small class="d-block text-truncate">欢迎回来，{{ name }}</small>
            </div>
        </div>
    </div>
    <div class="sidebar-scroll">
        <nav class="nav flex-column">
            <a class="nav-link {% if request.path == '/manager/dashboard/' %}active{% endif %}" href="/manager/dashboard/">
                <i class="fas fa-chart-pie"></i><span data-zh="仪表板" data-en="Dashboard" data-fr="Tableau de bord">仪表板</span>
            </a>
            <a class="nav-link {% if '/manager/book_list/' in request.path or '/manager/add_book/' in request.path or '/manager/edit_book/' in request.path or '/manager/book_categories/' in request.path or '/manager/author_list/' in request.path or '/manager/add_author/' in request.path or '/manager/edit_author/' in request.path or '/manager/publisher_list/' in request.path or '/manager/add_publisher/' in request.path or '/manager/edit_publisher/' in request.path or '/manager/order_list/' in request.path or '/manager/order_detail/' in request.path %}active{% endif %}" href="/manager/book_list/">
                <i class="fas fa-book"></i><span data-zh="图书管理" data-en="Books" data-fr="Livres">图书管理</span>
            </a>
        </nav>
        <div class="nav-section-label">运营管理</div>
        <nav class="nav flex-column">
            <a class="nav-link {% if request.path == '/manager/admin/returns/' %}active{% endif %}" href="/manager/admin/returns/">
                <i class="fas fa-undo-alt"></i><span data-zh="退货与物流" data-en="Returns & Shipments" data-fr="Retours & expéditions">退货与物流</span>
            </a>
            <a class="nav-link {% if request.path == '/manager/blog_list/' %}active{% endif %}" href="/manager/blog_list/">
                <i class="fas fa-blog"></i><span>博客管理</span>
            </a>
            <a class="nav-link {% if request.path == '/manager/email/' %}active{% endif %}" href="/manager/email/">
                <i class="fas fa-envelope"></i><span data-zh="消息管理" data-en="Messages" data-fr="Messages">消息管理</span>
            </a>
            <a class="nav-link {% if request.path == '/manager/admin/store-messages/' %}active{% endif %}" href="/manager/admin/store-messages/">
                <i class="fas fa-comments"></i><span data-zh="店铺消息" data-en="Store Messages" data-fr="Messages boutique">店铺消息</span>
            </a>
            <a class="nav-link {% if request.path == '/manager/admin/reviews/' %}active{% endif %}" href="/manager/admin/reviews/">
                <i class="fas fa-star-half-alt"></i><span data-zh="买家评价" data-en="Buyer reviews" data-fr="Avis clients">买家评价</span>
            </a>
            <a class="nav-link {% if '/marketplace/admin/' in request.path %}active{% endif %}" href="/marketplace/admin/dashboard/">
                <i class="fas fa-store"></i><span>市场管理</span>
            </a>
        </nav>
        <div class="nav-section-label">平台管理</div>
        <nav class="nav flex-column">
            <a class="nav-link {% if request.path == '/manager/admin/users/' %}active{% endif %}" href="/manager/admin/users/">
                <i class="fas fa-users"></i><span>用户管理</span>
            </a>
            <a class="nav-link {% if request.path == '/manager/admin/vendors/' %}active{% endif %}" href="/manager/admin/vendors/">
                <i class="fas fa-store-alt"></i><span>卖家管理</span>
            </a>
            <a class="nav-link {% if request.path == '/manager/inventory/' %}active{% endif %}" href="/manager/inventory/">
                <i class="fas fa-boxes"></i><span data-zh="库存管理" data-en="Inventory" data-fr="Inventaire">库存管理</span>
            </a>
            <a class="nav-link {% if request.path == '/manager/admin/escrow/' %}active{% endif %}" href="/manager/admin/escrow/">
                <i class="fas fa-vault"></i><span data-zh="托管与结算" data-en="Escrow & payouts" data-fr="Escrow & reversements">托管与结算</span>
            </a>
            <a class="nav-link {% if request.path == '/manager/admin/managers/' %}active{% endif %}" href="/manager/admin/managers/">
                <i class="fas fa-user-shield"></i><span data-zh="管理员账户" data-en="Admin Accounts" data-fr="Comptes administrateurs">管理员账户</span>
            </a>
        </nav>
    </div>
    <div class="sidebar-footer">
        <nav class="nav flex-column">
            <a class="nav-link" href="/manager/public/">
                <i class="fas fa-globe"></i><span>查看网站</span>
            </a>
            <a class="nav-link" href="/manager/logout/">
                <i class="fas fa-sign-out-alt"></i><span>退出登录</span>
            </a>
        </nav>
    </div>
</aside>
<div class="admin-sidebar-backdrop" id="adminSidebarBackdrop" aria-hidden="true"></div>
<script>
(function() {
    var sidebar = document.getElementById('adminSidebar');
    var backdrop = document.getElementById('adminSidebarBackdrop');
    if (!sidebar || !backdrop) return;
    var storageKey = 'adminSidebarCollapsed';
    var toggle = null;

    function mountToolbarToggle() {
        var main = document.querySelector('.admin-main-offset');
        if (!main || document.getElementById('adminSidebarToggle')) {
            toggle = document.getElementById('adminSidebarToggle');
            return !!toggle;
        }
        var toolbar = document.createElement('div');
        toolbar.className = 'admin-top-toolbar';
        toolbar.innerHTML = '<button type="button" class="admin-sidebar-toggle" id="adminSidebarToggle" aria-controls="adminSidebar" aria-expanded="true" title="Afficher / cacher le menu"><i class="fas fa-bars-staggered"></i></button>';
        main.insertBefore(toolbar, main.firstChild);
        toggle = document.getElementById('adminSidebarToggle');
        return !!toggle;
    }

    function isMobile() {
        return window.innerWidth <= 991;
    }
    function closeMobile() {
        sidebar.classList.remove('open');
        backdrop.classList.remove('show');
        if (toggle) toggle.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
    }
    function openMobile() {
        sidebar.classList.add('open');
        backdrop.classList.add('show');
        if (toggle) toggle.setAttribute('aria-expanded', 'true');
        document.body.style.overflow = 'hidden';
    }
    function applyDesktopState(collapsed) {
        document.body.classList.toggle('admin-sidebar-collapsed', collapsed && !isMobile());
        if (!toggle) return;
        toggle.setAttribute('aria-expanded', collapsed && !isMobile() ? 'false' : 'true');
        var icon = toggle.querySelector('i');
        if (icon) icon.className = collapsed && !isMobile() ? 'fas fa-bars' : 'fas fa-bars-staggered';
    }
    function onToggleClick() {
        if (isMobile()) {
            if (sidebar.classList.contains('open')) closeMobile(); else openMobile();
            return;
        }
        var collapsed = !document.body.classList.contains('admin-sidebar-collapsed');
        localStorage.setItem(storageKey, collapsed ? '1' : '0');
        applyDesktopState(collapsed);
    }
    function init() {
        if (!mountToolbarToggle()) return;
        if (toggle.dataset.bound !== '1') {
            toggle.dataset.bound = '1';
            toggle.addEventListener('click', onToggleClick);
        }
        applyDesktopState(localStorage.getItem(storageKey) === '1');
    }
    backdrop.addEventListener('click', closeMobile);
    window.addEventListener('resize', function() {
        closeMobile();
        applyDesktopState(localStorage.getItem(storageKey) === '1');
    });
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
