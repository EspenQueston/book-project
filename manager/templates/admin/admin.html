{% load i18n %}
<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUNO 360 - Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --login-primary: #1d4ed8;
            --login-secondary: #14245f;
            --login-deep: #17113a;
            --login-glass: rgba(255,255,255,.10);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #070716;
        }
        .login-scene {
            position: fixed;
            inset: 0;
            overflow: hidden;
            background:
                radial-gradient(circle at 50% -10%, rgba(255,255,255,.22), transparent 34%),
                radial-gradient(circle at 18% 28%, rgba(29,78,216,.42), transparent 28%),
                radial-gradient(circle at 84% 68%, rgba(20,36,95,.44), transparent 30%),
                linear-gradient(135deg, #1d4ed8 0%, #14245f 48%, #17113a 100%);
        }
        .login-scene::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: .08;
            mix-blend-mode: soft-light;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 220px 220px;
        }
        .login-orb {
            position: absolute;
            border-radius: 999px;
            filter: blur(3px);
            background: rgba(255,255,255,.13);
            box-shadow: inset 0 0 40px rgba(255,255,255,.12), 0 30px 90px rgba(15,23,42,.18);
            animation: orbFloat 9s ease-in-out infinite;
        }
        .orb-a { width: 110px; height: 110px; top: 14%; left: 10%; animation-delay: 0s; }
        .orb-b { width: 165px; height: 165px; right: 8%; bottom: 18%; animation-delay: 1.4s; }
        .orb-c { width: 78px; height: 78px; left: 58%; bottom: 12%; animation-delay: 2.8s; }
        .glow-top, .glow-bottom {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 999px;
            pointer-events: none;
        }
        .glow-top {
            top: -20%;
            width: 115vh;
            height: 62vh;
            background: rgba(255,255,255,.18);
            filter: blur(75px);
            animation: glowPulse 8s ease-in-out infinite;
        }
        .glow-bottom {
            bottom: -35%;
            width: 95vh;
            height: 80vh;
            background: rgba(29,78,216,.24);
            filter: blur(75px);
            animation: glowPulse 7s ease-in-out infinite reverse;
        }
        .login-shell {
            position: relative;
            z-index: 2;
            width: min(920px, 100%);
            perspective: 1500px;
        }
        .login-container {
            position: relative;
            width: 100%;
            min-height: 500px;
            border-radius: 28px;
            overflow: hidden;
            background: rgba(12, 10, 36, .34);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,.12);
            box-shadow: 0 34px 90px rgba(15,23,42,.34);
            transform-style: preserve-3d;
            transition: transform .18s ease, box-shadow .25s ease;
        }
        .login-container::before,
        .login-container::after {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 28px;
            pointer-events: none;
        }
        .login-container::before {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.58), transparent);
            height: 3px;
            bottom: auto;
            animation: beamX 3.4s ease-in-out infinite;
        }
        .login-container::after {
            background: linear-gradient(180deg, transparent, rgba(255,255,255,.34), transparent);
            width: 3px;
            left: auto;
            animation: beamY 3.4s ease-in-out infinite .8s;
        }
        .login-left {
            min-height: 500px;
            color: white;
            padding: 56px 42px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background:
                linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.03)),
                radial-gradient(circle at 20% 20%, rgba(255,255,255,.18), transparent 30%);
            border-right: 1px solid rgba(255,255,255,.08);
        }
        .login-right {
            min-height: 500px;
            padding: 56px 42px;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,.90);
            color: #172033;
        }
        .logo-badge {
            width: 72px;
            height: 72px;
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
            background: rgba(255,255,255,.14);
            border: 1px solid rgba(255,255,255,.16);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 24px 54px rgba(15,23,42,.18);
            font-size: 2rem;
        }
        .welcome-text {
            font-size: 1.55rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: .95rem;
            opacity: .82;
            margin-bottom: 28px;
        }
        .features {
            width: min(300px, 100%);
            display: grid;
            gap: 12px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.08);
            font-size: .82rem;
            text-align: left;
        }
        .feature-item i { width: 18px; text-align: center; }
        .login-form {
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
        }
        .form-title {
            color: #1f2937;
            font-weight: 800;
            margin-bottom: 8px;
            text-align: center;
            font-size: 1.55rem;
        }
        .form-subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 28px;
            font-size: .88rem;
        }
        .form-group {
            margin-bottom: 16px;
            position: relative;
            transition: transform .22s ease;
        }
        .form-control {
            border: 1px solid #dbe3f3;
            border-radius: 14px;
            padding: 14px 48px 14px 48px;
            font-size: .95rem;
            transition: all .25s ease;
            background: #eef3ff;
            min-height: 50px;
        }
        .form-control:focus {
            border-color: var(--login-primary);
            box-shadow: 0 0 0 .24rem rgba(29,78,216,.14);
            background: #fff;
        }
        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1rem;
            transition: color .2s ease;
        }
        .form-group:focus-within .input-icon { color: var(--login-primary); }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            border: 0;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            color: #64748b;
            background: transparent;
            transition: background .2s ease, color .2s ease;
        }
        .password-toggle:hover { background: #eef2ff; color: var(--login-primary); }
        .login-options {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin: 10px 0 20px;
            color: #64748b;
            font-size: .8rem;
        }
        .login-book-icon {
            width: 58px;
            height: 58px;
            margin: 0 auto 14px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.45rem;
            color: #fff;
            background: linear-gradient(135deg, #1d4ed8 0%, #14245f 100%);
            box-shadow: 0 14px 28px rgba(29,78,216,.28);
        }
        .login-options label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .login-options input { accent-color: var(--login-primary); }
        .btn-login {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #1d4ed8 0%, #14245f 100%);
            border: none;
            padding: 14px 26px;
            font-size: .95rem;
            font-weight: 800;
            border-radius: 14px;
            width: 100%;
            color: white;
            transition: transform .25s ease, box-shadow .25s ease;
            text-transform: uppercase;
            letter-spacing: .08em;
            box-shadow: 0 16px 34px rgba(29,78,216,.28);
        }
        .btn-login::before {
            content: "";
            position: absolute;
            inset: 0;
            transform: translateX(-120%);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.42), transparent);
            animation: buttonShine 2.8s ease-in-out infinite;
        }
        .btn-login:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 20px 40px rgba(29,78,216,.34);
            color: white;
        }
        .forgot-password {
            text-align: center;
            margin-top: 18px;
        }
        .forgot-password a,
        .public-access a {
            color: #1d4ed8;
            text-decoration: none;
            font-size: .84rem;
            font-weight: 600;
        }
        .forgot-password a:hover,
        .public-access a:hover { color: #4f46e5; }
        .public-access {
            text-align: center;
            margin-top: 26px;
            padding-top: 20px;
            border-top: 1px solid #e1e8f5;
        }
        .login-lang-note {
            position: fixed;
            right: 20px;
            bottom: 18px;
            z-index: 3;
            font-size: .78rem;
            color: rgba(255,255,255,.78);
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 999px;
            padding: 8px 12px;
            backdrop-filter: blur(14px);
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate3d(0,0,0) scale(1); }
            50% { transform: translate3d(16px,-24px,0) scale(1.08); }
        }
        @keyframes glowPulse {
            0%, 100% { opacity: .52; transform: translateX(-50%) scale(.98); }
            50% { opacity: .86; transform: translateX(-50%) scale(1.04); }
        }
        @keyframes beamX {
            0% { transform: translateX(-65%); opacity: .2; }
            45% { opacity: .78; }
            100% { transform: translateX(165%); opacity: .2; }
        }
        @keyframes beamY {
            0% { transform: translateY(-65%); opacity: .16; }
            45% { opacity: .64; }
            100% { transform: translateY(165%); opacity: .16; }
        }
        @keyframes buttonShine {
            0%, 42% { transform: translateX(-120%); }
            78%, 100% { transform: translateX(120%); }
        }
        @media (max-width: 768px) {
            body {
                padding: 16px;
                overflow-y: auto;
            }
            .login-shell { width: 100%; }
            .login-container {
                border-radius: 24px;
                transform: none !important;
            }
            .login-left {
                min-height: auto;
                padding: 30px 24px 24px;
                border-right: 0;
                border-bottom: 1px solid rgba(255,255,255,.10);
            }
            .features {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .feature-item {
                font-size: .72rem;
                padding: 9px 10px;
            }
            .login-right {
                min-height: auto;
                padding: 30px 22px;
            }
            .form-title { font-size: 1.35rem; }
            .login-options {
                align-items: flex-start;
                flex-direction: column;
            }
        }
        @media (max-width: 480px) {
            .features { grid-template-columns: 1fr; }
            .login-left { display: none; }
            .login-right { border-radius: 24px; }
            .login-lang-note { right: 14px; bottom: 12px; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: .01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="login-scene" aria-hidden="true">
        <div class="glow-top"></div>
        <div class="glow-bottom"></div>
        <div class="login-orb orb-a"></div>
        <div class="login-orb orb-b"></div>
        <div class="login-orb orb-c"></div>
    </div>

    <main class="login-shell">
        <div class="login-container" id="loginCard">
            <div class="row g-0 h-100">
                <section class="col-md-6 login-left">
                    <div class="logo-badge">
                        <i class="fas fa-book-open"></i>
                    </div>
                    <h2 class="welcome-text" data-zh="欢迎回来" data-en="Welcome back" data-fr="Bon retour">欢迎回来</h2>
                    <p class="subtitle" data-zh="现代 DUNO 360 管理控制台" data-en="Modern DUNO 360 dashboard" data-fr="Tableau de bord moderne DUNO 360">现代 DUNO 360 管理控制台</p>

                    <div class="features mt-3">
                        <div class="feature-item">
                            <i class="fas fa-book-open"></i>
                            <span data-zh="图书管理" data-en="Book management" data-fr="Gestion des livres">图书管理</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-store"></i>
                            <span data-zh="市场商品" data-en="Marketplace products" data-fr="Produits marketplace">市场商品</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-graduation-cap"></i>
                            <span data-zh="课程与数字学习" data-en="Courses and digital learning" data-fr="Cours et apprentissage numérique">课程与数字学习</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-basket-shopping"></i>
                            <span data-zh="超市库存" data-en="Supermarket inventory" data-fr="Inventaire supermarché">超市库存</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-chart-bar"></i>
                            <span data-zh="销售数据分析" data-en="Sales data analytics" data-fr="Analyse des ventes">销售数据分析</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-shield-alt"></i>
                            <span data-zh="安全可靠" data-en="Secure and reliable" data-fr="Sécurisé et fiable">安全可靠</span>
                        </div>
                    </div>
                </section>

                <section class="col-md-6 login-right">
                    <form action="/manager/login/" method="post" class="login-form">
                        {% csrf_token %}
                        <div class="login-book-icon" title="Book management" aria-hidden="true">
                            <i class="fas fa-book-open"></i>
                        </div>
                        <h2 class="form-title" data-zh="管理员登录" data-en="Admin Login" data-fr="Connexion admin">管理员登录</h2>
                        <p class="form-subtitle" data-zh="登录后管理图书、市场和订单" data-en="Sign in to manage books, marketplace and orders" data-fr="Connectez-vous pour gérer livres, marché et commandes">登录后管理图书、市场和订单</p>

                        {% if error %}
                        <div class="alert alert-danger rounded-3 py-2 small">{{ error }}</div>
                        {% endif %}

                        <div class="form-group">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" class="form-control" name="number"
                                   data-ph-zh="用户名" data-ph-en="Username" data-ph-fr="Nom d’utilisateur"
                                   placeholder="用户名" required autofocus autocomplete="username">
                        </div>

                        <div class="form-group">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-control" name="password" id="adminPassword"
                                   data-ph-zh="密码" data-ph-en="Password" data-ph-fr="Mot de passe"
                                   placeholder="密码" required autocomplete="current-password">
                            <button class="password-toggle" type="button" onclick="toggleAdminPassword()" aria-label="Show password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>

                        <div class="login-options">
                            <label>
                                <input type="checkbox" name="remember_me">
                                <span data-zh="记住我" data-en="Remember me" data-fr="Se souvenir de moi">记住我</span>
                            </label>
                        </div>

                        <button type="submit" class="btn btn-login">
                            <i class="fas fa-right-to-bracket me-2"></i><span data-zh="登录" data-en="Login" data-fr="Connexion">登录</span>
                        </button>

                        <div class="public-access">
                            <a href="/manager/public/">
                                <i class="fas fa-globe me-1"></i>
                                <span data-zh="访问公共目录和市场" data-en="Visit public catalog and marketplace" data-fr="Visiter le catalogue public et le marché">访问公共目录和市场</span>
                            </a>
                        </div>
                    </form>
                </section>
            </div>
        </div>
    </main>
    <div class="login-lang-note"><i class="fas fa-language me-1"></i><span data-zh="支持中 / 英 / 法" data-en="ZH / EN / FR ready" data-fr="ZH / EN / FR disponible">支持中 / 英 / 法</span></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleAdminPassword() {
            const input = document.getElementById('adminPassword');
            const icon = document.querySelector('.password-toggle i');
            if (!input || !icon) return;
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            icon.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
        }

        document.addEventListener('DOMContentLoaded', function() {
            const card = document.getElementById('loginCard');
            const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (card && !reduced && window.innerWidth > 768) {
                card.addEventListener('mousemove', function(e) {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    const rotateY = Math.max(-10, Math.min(10, x / 32));
                    const rotateX = Math.max(-10, Math.min(10, -y / 32));
                    card.style.transform = 'rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg) translateY(-2px)';
                });
                card.addEventListener('mouseleave', function() {
                    card.style.transform = 'rotateX(0deg) rotateY(0deg) translateY(0)';
                });
            }

            document.querySelectorAll('.form-control').forEach(function(input) {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'translateY(-2px)';
                });
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'translateY(0)';
                });
            });
        });
    </script>
{% include 'includes/global_popups.html' %}
<script src="/static/js/destructive_action_guards.js"></script>
<script src="/static/js/admin_i18n.js" defer></script>
</body>
</html>
