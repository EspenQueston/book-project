<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}市场管理{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #667eea; --secondary-color: #764ba2; }
        body { background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .sidebar { position: fixed; top: 0; left: 0; width: 260px; height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); z-index: 1000; overflow-y: auto; }
        .sidebar .nav-link { color: rgba(255,255,255,0.7); padding: 12px 20px; font-size: 0.9rem; transition: all 0.3s ease; border-radius: 8px; margin: 2px 10px; }
        .sidebar .nav-link:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .sidebar .nav-link.active { background: rgba(102,126,234,0.3); color: #fff; font-weight: 600; }
        .sidebar .nav-link i { width: 22px; margin-right: 10px; }
        .main-content { margin-left: 260px; padding: 30px; }
        .page-header-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 20px; padding: 25px 30px; color: #fff; margin-bottom: 25px; }
        .page-header-card h4 { font-weight: 700; margin-bottom: 0; }
        .content-card { background: #fff; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .toolbar { background: #fff; border-radius: 15px; padding: 15px 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .btn-primary-gradient { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: #fff; border-radius: 10px; font-weight: 600; padding: 8px 20px; }
        .btn-primary-gradient:hover { color: #fff; box-shadow: 0 4px 15px rgba(102,126,234,0.3); }
        .table th { font-weight: 600; color: #64748b; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #f1f5f9; }
        .table td { vertical-align: middle; }
        @media(max-width:768px) { .sidebar { width: 100%; height: auto; position: relative; } .main-content { margin-left: 0; } }
        {% block extra_admin_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="sidebar">
            <div class="p-3">
                <h5 class="text-white mb-0"><i class="fas fa-store"></i> 市场管理</h5>
                <small style="color:rgba(255,255,255,0.5);">Marketplace Admin</small>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link {% block nav_dashboard %}{% endblock %}" href="{% url 'marketplace:admin_dashboard' %}"><i class="fas fa-tachometer-alt"></i> 仪表板</a>
                <a class="nav-link {% block nav_products %}{% endblock %}" href="{% url 'marketplace:admin_products' %}"><i class="fas fa-shopping-bag"></i> 商品管理</a>
                <a class="nav-link {% block nav_courses %}{% endblock %}" href="{% url 'marketplace:admin_courses' %}"><i class="fas fa-graduation-cap"></i> 课程管理</a>
                <a class="nav-link {% block nav_supermarket %}{% endblock %}" href="{% url 'marketplace:admin_supermarket' %}"><i class="fas fa-apple-alt"></i> 超市管理</a>
                <a class="nav-link {% block nav_categories %}{% endblock %}" href="{% url 'marketplace:admin_categories' %}"><i class="fas fa-folder-open"></i> 分类管理</a>
                <a class="nav-link {% block nav_orders %}{% endblock %}" href="{% url 'marketplace:admin_orders' %}"><i class="fas fa-receipt"></i> 订单管理</a>
                <div class="dropdown-divider mx-3 my-2" style="border-color: rgba(255,255,255,0.15);"></div>
                <a class="nav-link" href="/manager/dashboard/"><i class="fas fa-arrow-left"></i> 返回主面板</a>
                <a class="nav-link" href="{% url 'marketplace:home' %}"><i class="fas fa-globe"></i> 查看市场</a>
                <a class="nav-link" href="/manager/logout/"><i class="fas fa-sign-out-alt"></i> 退出登录</a>
            </nav>
        </div>

        <div class="main-content">
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert" style="border-radius:12px;">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}

            {% block admin_content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_admin_js %}{% endblock %}
    <script src="/static/js/admin_i18n.js" defer></script>
</body>
</html>
