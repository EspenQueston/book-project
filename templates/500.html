<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - 服务器错误</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .error-container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            position: relative;
            z-index: 2;
        }
        .error-code {
            font-size: 10rem;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 0;
            animation: shake 4s ease-in-out infinite;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10% { transform: translateX(-5px) rotate(-1deg); }
            20% { transform: translateX(5px) rotate(1deg); }
            30% { transform: translateX(-3px); }
            40% { transform: translateX(3px); }
            50%, 100% { transform: translateX(0); }
        }
        .error-icon {
            font-size: 4rem;
            color: #e74c3c;
            margin-bottom: 1rem;
            animation: spin-slow 6s linear infinite;
        }
        @keyframes spin-slow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }
        .error-message {
            font-size: 1.1rem;
            color: #718096;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn-home {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border: none;
            padding: 12px 36px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
            color: white;
        }
        .btn-refresh {
            background: transparent;
            color: #e74c3c;
            border: 2px solid #e74c3c;
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            margin-left: 12px;
            cursor: pointer;
        }
        .btn-refresh:hover {
            background: #e74c3c;
            color: white;
            transform: translateY(-3px);
        }
        .bg-shapes {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .bg-shapes .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
        }
        .shape-1 {
            width: 350px; height: 350px;
            background: #e74c3c;
            top: -120px; right: -70px;
            animation: drift 9s ease-in-out infinite;
        }
        .shape-2 {
            width: 250px; height: 250px;
            background: #c0392b;
            bottom: -80px; left: -50px;
            animation: drift 11s ease-in-out infinite reverse;
        }
        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }
        .status-info {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255,255,255,0.5);
            border-radius: 15px;
            color: #718096;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="error-container">
        <div class="error-code">500</div>
        <div class="error-icon"><i class="fas fa-cog"></i></div>
        <h1 class="error-title">服务器内部错误 / Server Error</h1>
        <p class="error-message">
            抱歉，服务器遇到了内部错误，无法完成您的请求。<br>
            <small>Sorry, the server encountered an internal error. Please try again later.</small>
        </p>

        <div>
            <a href="/" class="btn-home">
                <i class="fas fa-home"></i> 返回首页
            </a>
            <a onclick="location.reload()" class="btn-refresh">
                <i class="fas fa-redo"></i> 重新加载
            </a>
        </div>

        <div class="status-info">
            <i class="fas fa-info-circle me-1"></i>
            我们的团队已被通知此问题。如果问题持续存在，请联系管理员。<br>
            <small>Our team has been notified. If the problem persists, please contact the administrator.</small>
        </div>
    </div>
</body>
</html>
