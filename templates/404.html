<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .error-container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            position: relative;
            z-index: 2;
        }
        .error-code {
            font-size: 10rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 0;
            animation: float 3s ease-in-out infinite;
            text-shadow: none;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .error-icon {
            font-size: 4rem;
            color: var(--secondary-color);
            margin-bottom: 1rem;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
        .error-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }
        .error-message {
            font-size: 1.1rem;
            color: #718096;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn-home {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border: none;
            padding: 12px 36px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
            color: white;
        }
        .btn-back {
            background: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            margin-left: 12px;
        }
        .btn-back:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-3px);
        }
        /* Floating background shapes */
        .bg-shapes {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .bg-shapes .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.08;
        }
        .shape-1 {
            width: 300px; height: 300px;
            background: var(--primary-color);
            top: -100px; right: -50px;
            animation: drift 8s ease-in-out infinite;
        }
        .shape-2 {
            width: 200px; height: 200px;
            background: var(--secondary-color);
            bottom: -50px; left: -30px;
            animation: drift 10s ease-in-out infinite reverse;
        }
        .shape-3 {
            width: 150px; height: 150px;
            background: var(--primary-color);
            top: 50%; left: 10%;
            animation: drift 7s ease-in-out infinite;
        }
        @keyframes drift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -30px) rotate(5deg); }
            50% { transform: translate(-10px, 20px) rotate(-5deg); }
            75% { transform: translate(15px, 10px) rotate(3deg); }
        }
        .search-box {
            margin-top: 2rem;
            display: flex;
            gap: 8px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .search-box input {
            flex: 1;
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            border-color: var(--primary-color);
        }
        .search-box button {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .search-box button:hover { transform: scale(1.1); }
        .helpful-links {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .helpful-links a {
            color: #718096;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .helpful-links a:hover { color: var(--primary-color); }
        .helpful-links a i { margin-right: 4px; }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-icon"><i class="fas fa-compass"></i></div>
        <h1 class="error-title">页面未找到 / Page Not Found</h1>
        <p class="error-message">
            抱歉，您访问的页面不存在或已被移动。<br>
            <small>Sorry, the page you're looking for doesn't exist or has been moved.</small>
        </p>

        <div>
            <a href="/" class="btn-home">
                <i class="fas fa-home"></i> 返回首页
            </a>
            <a href="javascript:history.back()" class="btn-back">
                <i class="fas fa-arrow-left"></i> 返回上页
            </a>
        </div>

        <div class="helpful-links">
            <a href="/manager/public/"><i class="fas fa-book"></i> 图书中心</a>
            <a href="/marketplace/"><i class="fas fa-store"></i> 市场</a>
            <a href="/manager/public/about/"><i class="fas fa-info-circle"></i> 关于我们</a>
            <a href="/manager/public/contact/"><i class="fas fa-envelope"></i> 联系我们</a>
        </div>
    </div>
</body>
</html>
