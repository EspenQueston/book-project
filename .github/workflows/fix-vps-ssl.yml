name: Fix VPS SSL
on:
  workflow_dispatch:
jobs:
  fix-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up RSA SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_RSA_KEY_TMP }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 159.203.186.103 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Write fix script
        run: python3 -c "import base64; open('/tmp/remote_fix.py','wb').write(base64.b64decode(''))"

      - name: Copy fix script to VPS
        run: scp -o ConnectTimeout=30 -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa /tmp/remote_fix.py root@159.203.186.103:/tmp/remote_fix.py

      - name: Execute fix on VPS
        run: |
          ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@159.203.186.103 \
            'python3 /tmp/remote_fix.py; rm -f /tmp/remote_fix.py'
